<div class="min-h-screen px-5 py-16 flex items-center justify-center">
  <section
    class="w-full max-w-[420px] bg-white/[0.02] border border-white/[0.08] rounded-2xl p-8 flex flex-col gap-8 shadow-[0_20px_80px_rgba(0,0,0,0.35)]"
  >
    <app-login-header />
    <app-login-form
      [isLoading]="vm.viewState.isLoading()"
      [error]="vm.viewState.error()"
      (submitted)="onSubmit($event)"
    />
    <app-login-footer />
  </section>
</div>
