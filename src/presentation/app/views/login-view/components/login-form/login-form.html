<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
  @if (error) {
    <div
      class="flex items-start gap-2.5 bg-red-500/6 border border-red-500/18 text-red-400/80 text-xs px-3.5 py-2.5 rounded-xl"
    >
      <svg
        class="w-4 h-4 shrink-0 mt-0.5"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      <span>{{ error | translate }}</span>
    </div>
  }

  <div class="flex flex-col gap-1.5">
    <label class="text-xs text-white/40 font-medium" for="username">Username</label>
    <input
      id="username"
      formControlName="username"
      type="text"
      autocomplete="username"
      placeholder="emilys"
      class="w-full bg-white/3 border border-white/8 rounded-xl px-4 py-3 text-body text-white/80 placeholder:text-white/20 outline-none transition-all duration-200 focus:bg-white/5 focus:border-white/18 focus:ring-1 focus:ring-white/12"
    />
  </div>

  <div class="flex flex-col gap-1.5">
    <label class="text-xs text-white/40 font-medium" for="password">Password</label>
    <input
      id="password"
      formControlName="password"
      type="password"
      autocomplete="current-password"
      placeholder="••••••••"
      class="w-full bg-white/3 border border-white/8 rounded-xl px-4 py-3 text-body text-white/80 placeholder:text-white/20 outline-none transition-all duration-200 focus:bg-white/5 focus:border-white/18 focus:ring-1 focus:ring-white/12"
    />
  </div>

  <button
    type="submit"
    [disabled]="isLoading || form.invalid"
    class="w-full bg-white text-bg-deep font-semibold text-body py-3 rounded-xl mt-1 transition-all duration-200 hover:bg-white/95 disabled:opacity-40 disabled:cursor-not-allowed"
  >
    @if (isLoading) {
      <span class="inline-flex items-center gap-1.5">
        <span class="w-1 h-1 rounded-full bg-bg-deep/60 animate-bounce-dot"></span>
        <span
          class="w-1 h-1 rounded-full bg-bg-deep/60 animate-bounce-dot [animation-delay:0.15s]"
        ></span>
        <span
          class="w-1 h-1 rounded-full bg-bg-deep/60 animate-bounce-dot [animation-delay:0.3s]"
        ></span>
      </span>
    } @else {
      Sign in
    }
  </button>
</form>
