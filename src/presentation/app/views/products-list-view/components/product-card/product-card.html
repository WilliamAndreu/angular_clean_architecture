<article
  [routerLink]="['/products', product().id]"
  class="group relative bg-white/[0.02] border border-white/[0.06] rounded-2xl overflow-hidden cursor-pointer transition-all duration-200 hover:bg-white/[0.04] hover:border-white/[0.12]"
>
  <div class="relative aspect-square overflow-hidden bg-[#0f0f0f]">
    @defer (on viewport) {
      <img
        appImgFallback
        class="w-full h-full object-contain p-5 transition-transform duration-500 group-hover:scale-[1.03]"
        [src]="product().thumbnail"
        [alt]="product().title"
        loading="lazy"
      />
    } @placeholder {
      <div class="skeleton-shimmer w-full h-full"></div>
    }

    <span
      class="absolute top-3 left-3 text-[10px] font-medium tracking-wide uppercase text-white/40 bg-white/[0.05] px-2 py-0.5 rounded-md"
    >
      {{ product().category }}
    </span>
  </div>

  <div class="px-4 pt-4 pb-4 flex flex-col gap-2">
    <p class="text-[13px] font-medium text-white/85 line-clamp-2 leading-snug">
      {{ product().title }}
    </p>

    <div class="flex items-center justify-between gap-2">
      <span class="text-[15px] font-semibold text-white/90">
        {{ product().price | price }}
      </span>

      @if (product().discountPercentage > 0) {
        <span
          class="text-[10px] font-medium text-emerald-400/80 bg-emerald-400/[0.08] px-1.5 py-0.5 rounded-md"
        >
          -{{ product().discountPercentage.toFixed(0) }}%
        </span>
      }

      <span class="flex items-center gap-1 text-[11px] text-white/35 ml-auto">
        <svg class="w-3 h-3 text-amber-400/70" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
          />
        </svg>
        {{ product().rating.toFixed(1) }}
      </span>
    </div>
  </div>
</article>
