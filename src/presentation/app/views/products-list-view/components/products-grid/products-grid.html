<div
  class="grid w-full grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-5 justify-center max-[640px]:grid-cols-2 max-[640px]:gap-3"
>
  @for (product of products; track product.id) {
    <app-product-card [product]="product" />
  } @empty {
    <div class="col-span-full py-24 flex flex-col items-center gap-2 text-center">
      <p class="text-[14px] font-medium text-white/45">No products found</p>
      <p class="text-[12px] text-white/25">No results for &ldquo;{{ searchTerm }}&rdquo;</p>
    </div>
  }
</div>
